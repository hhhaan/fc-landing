name: Deploy Admin

on:
  push:
    branches: [main]
    paths:
      - 'apps/admin/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'vercel.admin.json'
      - '.github/workflows/deploy-admin.yml'
  workflow_dispatch:

concurrency:
  group: deploy-admin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Remote build on Vercel so Sensitive env vars resolve correctly.
      # (vercel pull + prebuilt bakes Sensitive secrets as the literal "[SENSITIVE]".)
      - name: Deploy to Vercel
        run: |
          npx vercel deploy --prod --yes \
            --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
